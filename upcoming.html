{% extends "base.html" %}
{% block content %}

<div class="card">
    <h1>Upcoming Expenses</h1>

    <form action="{{ url_for('add_upcoming') }}" method="POST" class="form-row">
        <input type="text" name="due_date" placeholder="DD-MM-YYYY" required>
        <input type="text" name="title" placeholder="Title (Rent/EMI)" required>
        <input type="number" step="0.01" name="amount" placeholder="Amount" required>
        <input type="text" name="note" placeholder="Note" required>
        <button type="submit">Add</button>
    </form>

    <table>
        <tr>
            <th>Due Date</th>
            <th>Title</th>
            <th>Amount</th>
            <th>Note</th>
            <th>Action</th>
        </tr>

        {% for item in upcoming %}
        <tr>
            <td>{{ item["due_date"] }}</td>
            <td>{{ item["title"] }}</td>
            <td>{{ item["amount"] }}</td>
            <td>{{ item["note"] }}</td>
            <td>
                <a class="btn danger" href="{{ url_for('delete_upcoming', upcoming_id=item['id']) }}">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>

    <a class="btn light" href="{{ url_for('index') }}">Back to Dashboard</a>
</div>

{% endblock %}
