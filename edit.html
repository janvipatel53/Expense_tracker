{% extends "base.html" %}
{% block content %}

<div class="card">
    <h1>Edit Expense</h1>

    <form action="{{ url_for('update_expense', expense_id=expense['id']) }}" method="POST" class="form-row">
        <input type="text" name="date" value="{{ expense['date'] }}" required>
        <input type="text" name="category" value="{{ expense['category'] }}" required>
        <input type="number" step="0.01" name="amount" value="{{ expense['amount'] }}" required>
        <input type="text" name="description" value="{{ expense['description'] }}" required>
        <button type="submit">Update</button>
    </form>

    <a class="btn light" href="{{ url_for('index') }}">Back</a>
</div>

{% endblock %}
